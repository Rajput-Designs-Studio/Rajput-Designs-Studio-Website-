      <h2>About Muhammad Ismail — Rajput Designs Studio</h2>
      <p>My name is Muhammad Ismail — a freelance graphic designer based in Jhelum and Islamabad, Pakistan. With 1+ year of professional experience in logo design, brand identity, social media graphics, and digital visuals, I use Adobe Photoshop, Adobe Illustrator, Figma, and Adobe InDesign to turn ideas into clean, professional designs that connect with the right people. Worked with clients across Pakistan and worldwide including Saddar Engineering Works, food and restaurant brands, and e-learning platforms. Certified in UX Design (Google/Coursera), AI Fluency (Anthropic), Gemini (Google), and Figma Design (Alison CPD).</p>
      <p><strong>Email:</strong> hello@rajputdesignsstudio.com | <strong>WhatsApp:</strong> +923365843243 | <strong>Location:</strong> Jhelum / Islamabad, Pakistan</p>

      <h2>Graphic Design Services</h2>

      <h3>01. Logo Design</h3>
      <p>Professional logo design with 3 original concepts, unlimited revisions, and all file formats — PNG, SVG, AI, PDF with transparent background. Delivered in 3–5 days. Packages from $65.</p>

      <h3>02. Brand Identity Design</h3>
      <p>Complete brand identity packages including logo, color palette, typography, business card, letterhead, and brand guidelines. Build a cohesive professional brand from scratch. Full branding package from $249.</p>

      <h3>03. Social Media Graphics Design</h3>
      <p>Custom social media graphics, posts, stories, and cover images designed for Instagram, Facebook, and LinkedIn. Build brand consistency and grow your audience. Packages from $35.</p>

      <h3>04. Restaurant Menu &amp; Print Design</h3>
      <p>Restaurant menus, promotional posters, flyers, banners, and standees with bold typography and strategic layout. Print-ready files for both digital and physical use. Menu design from $79.</p>

      <h3>05. Website UI Design</h3>
      <p>Modern, professional website UI/UX design using Figma. Clean navigation, responsive layout, and engaging visual hierarchy. Website design packages from $149.</p>

      <h3>06. Banner &amp; Poster Design</h3>

      <h2>Frequently Asked Questions</h2>

      <h3>How much does a logo design cost?</h3>
      <p>Logo design packages start at $65, including 3 concepts, 5 revisions, and all file formats (PNG, SVG, PDF, AI) with transparent background.</p>

      <h3>How long does graphic design take?</h3>
      <p>Most projects deliver within 48 hours to 10 days. Logo design: 3–5 days. Full branding: 7–10 days. Posters and banners: 48 hours.</p>

      <h3>Do you offer affordable graphic design packages?</h3>
      <p>Yes. Starter packages begin at $35. Specialty packages including logo, menu, banners, and website design range from $39 to $249.</p>

      <h3>Can I hire a graphic designer online?</h3>
      <p>Yes. Rajput Designs Studio works with clients worldwide. Contact via email at hello@rajputdesignsstudio.com or WhatsApp at +923365843243 to get started.</p>

      <h3>What graphic design services do you offer?</h3>
      <p>Services include logo design, full brand identity, social media graphics, restaurant menu design, promotion posters, banner design, website UI design, and complete branding packages.</p>

      <h3>Why hire a professional designer instead of using Canva or Fiverr?</h3>
      <p>A professional designer creates original, custom designs tailored to your brand rather than templates. Rajput Designs Studio delivers unique concepts with full source files, brand consistency, and unlimited revisions — not a template anyone else can use.</p>

      <h3>What file formats do you deliver?</h3>
      <p>All file formats are included: PNG, SVG, AI, PDF, EPS, and JPG. Source files (AI/PSD) are always provided so you own your designs and can make future edits without coming back to us.</p>

      <h3>Do you offer unlimited revisions?</h3>
      <p>Yes. All packages include unlimited revisions until you are 100% satisfied with the final design. Your satisfaction is the only goal — no hidden revision fees.</p>
